</g>
<g class="eye-r">
  <ellipse cx="107.079" cy="81.866" rx="13.3995" ry="17.866" fill="#F2F3E5"/>
  <circle class="pupil-r" cx="107.079" cy="90.6204" r="9.37964" fill="#3F50B8"/>
</g>
</svg>
