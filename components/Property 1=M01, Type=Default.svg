<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes blink {
  0%, 84%, 100% { transform: scaleY(1); }
  88% { transform: scaleY(0.06); }
  93% { transform: scaleY(1); }
}
@keyframes look {
  0%, 100% { transform: translate(0px, 0px); }
  20%  { transform: translate(2.5px, -1px); }
  45%  { transform: translate(2px, 1.5px); }
  70%  { transform: translate(-2.5px, 0.5px); }
  90%  { transform: translate(-1px, -1.5px); }
}
.eye-l {
  transform-origin: 74.9207px 81.866px;
  animation: blink 3.8s ease-in-out infinite;
}
.eye-r {
  transform-origin: 107.079px 81.866px;
  animation: blink 3.8s ease-in-out infinite 0.015s;
}
.pupil-l {
  transform-box: fill-box; transform-origin: center;
  animation: look 7s ease-in-out infinite 0.5s;
}
.pupil-r {
  transform-box: fill-box; transform-origin: center;
  animation: look 7s ease-in-out infinite 0.8s;
}
</style>
