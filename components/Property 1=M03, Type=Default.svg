<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes blink {
  0%, 84%, 100% { transform: scaleY(1); }
  88% { transform: scaleY(0.06); }
  93% { transform: scaleY(1); }
}
@keyframes look {
  0%, 100% { transform: translate(0px, 0px); }
  30%  { transform: translate(2px, 2px); }
  55%  { transform: translate(-2.5px, -1px); }
  80%  { transform: translate(1.5px, -2px); }
}
.eye-l {
  transform-origin: 74.9206px 87.0159px;
  animation: blink 3.5s ease-in-out infinite 0.1s;
}
.eye-r {
  transform-origin: 107.079px 87.0159px;
  animation: blink 3.5s ease-in-out infinite 0.115s;
}
.pupil-l {
  transform-box: fill-box; transform-origin: center;
  animation: look 6.5s ease-in-out infinite 0.2s;
}
.pupil-r {
  transform-box: fill-box; transform-origin: center;
  animation: look 6.5s ease-in-out infinite 0.7s;
}
</style>
<path fill-rule="evenodd" clip-rule="evenodd" d="M43.5412 90L12.0494 71.7043L35.2607 31.2958L66.7708 49.5599L66.7886 13L113.212 13L113.229 49.5599L144.739 31.2958L167.951 71.7043L136.459 90L167.951 108.296L144.739 148.704L113.229 130.44L113.212 167H66.7886L66.7708 130.44L35.2607 148.704L12.0494 108.296L43.5412 90Z" fill="#1A5E36"/>
<g class="eye-l">
  <ellipse cx="74.9206" cy="87.0159" rx="13.3995" ry="17.866" fill="#F2F3E5"/>
  <circle class="pupil-l" cx="74.9205" cy="95.7703" r="9.37964" fill="#1A5E36"/>
</g>
<g class="eye-r">
  <ellipse cx="107.079" cy="87.0159" rx="13.3995" ry="17.866" fill="#F2F3E5"/>
  <circle class="pupil-r" cx="107.079" cy="95.7703" r="9.37964" fill="#1A5E36"/>
</g>
</svg>
