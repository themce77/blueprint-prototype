<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Category</title>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px; position: relative; overflow: hidden;
  border-radius: 20px; transform-origin: center center;
  transform: scale(var(--s,1)); background: #1f1f25;
}

/* ─── Status bar ─────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.9); pointer-events: none;
}

/* ─── Back button ────────────────────────────────────── */
.back-btn {
  position: absolute; top: 48px; left: 24px; z-index: 20;
  width: 48px; height: 48px; border-radius: 8px;
  background: rgba(255,255,255,0.16);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 140ms;
}
.back-btn:hover { background: rgba(255,255,255,0.22); }

/* ─── Scrollable content ─────────────────────────────── */
.cat-scroll {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  padding-top: 52px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }

.cat-inner {
  width: 994px; margin: 0 auto;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 48px;
  padding-bottom: 40px;
}

/* ─── Title ──────────────────────────────────────────── */
.cat-title {
  font-family: var(--font-display);
  font-size: 80px; line-height: 1.06;
  color: #f2f3e5;
  text-align: center;
  letter-spacing: 1.5px;
  margin: 0;
}

/* ─── 2×2 tile grid ──────────────────────────────────── */
.cat-grid {
  display: flex; flex-direction: column;
  gap: 24px;
  width: 924px;
}
.cat-row { display: flex; gap: 24px; }

.cat-tile {
  width: 450px; height: 450px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1);
}
.cat-tile:hover { transform: scale(1.015); }

.cat-tile-art {
  position: absolute; inset: 0;
}
.cat-tile-art img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

/* ─── Heart button ───────────────────────────────────── */
.cat-heart {
  position: absolute; top: 12px; right: 12px;
  width: 48px; height: 48px;
  background: none; border: none; padding: 0; margin: 0;
  appearance: none; -webkit-appearance: none;
  cursor: pointer; display: block; z-index: 2;
  transition: transform 120ms;
}
.cat-heart img { width: 48px; height: 48px; display: block; }
.cat-heart:hover { transform: scale(1.1); }

/* ─── Video info box ─────────────────────────────────── */
.cat-info {
  position: absolute; bottom: 12px; right: 12px;
  width: 260px; background: #36363f;
  border-radius: 12px; padding: 8px;
  box-sizing: border-box;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 2;
}
.cat-info-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--font-body); font-size: 18px; font-weight: 700;
  color: #f2f3e5; line-height: 1;
}
.cat-info-sparks { display: flex; align-items: center; gap: 4px; }
.cat-info-sparks img { width: 16px; height: 16px; display: block; }
.cat-info-title {
  font-family: var(--font-display); font-size: 24px; line-height: 1.12;
  color: #f2f3e5; letter-spacing: -0.4px; margin: 0;
}

</style>
</head>
<body>
<div class="bp-stage">
<div class="bp-device" id="device">

  <div class="sb">
    <span>9:41 Mon Jun 6</span>
    <span>100% 🔋</span>
  </div>

  <button class="back-btn" onclick="window.location.href='my-toolkit.html?tab=browse'">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="#f2f3e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="cat-scroll">
    <div class="cat-inner">
      <h1 class="cat-title" id="catTitle">Category</h1>
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </div>

</div>
</div>

<script>
function scale() {
  const s = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  document.getElementById('device').style.setProperty('--s', s);
}
scale(); addEventListener('resize', scale);

const CATEGORIES = {
  'calm-down': {
    title: 'Calm down',
    videos: [
      { bg: '#d0e8f5', art: './components/carousel-01.svg', title: 'Aurora Strauss: Calm in the crash', duration: '2:14', sparks: 1 },
      { bg: '#b8ddd0', art: './components/carousel-02.svg', title: 'Box breathing with Dr. Sarah Lin',   duration: '3:00', sparks: 1 },
      { bg: '#c8d8e8', art: './components/carousel-04.svg', title: 'Cold water reset: 60 seconds',       duration: '1:00', sparks: 1 },
      { bg: '#a0c8d8', art: './components/carousel-05.svg', title: 'Progressive muscle release',         duration: '4:30', sparks: 2 },
    ],
  },
  'boost-energy': {
    title: 'Boost energy',
    videos: [
      { bg: '#fff9dd', art: './components/carousel-02.svg', title: 'Zalia: Daring to be uniquely you',   duration: '1:07', sparks: 1 },
      { bg: '#f8d9d0', art: './components/carousel-03.svg', title: 'Karl Anthony Tawns: Morning fire',   duration: '1:07', sparks: 1 },
      { bg: '#c4a3ff', art: './components/carousel-04.svg', title: 'Jim Kwik: Power your brain',         duration: '2:00', sparks: 1 },
      { bg: '#fce3bb', art: './components/carousel-05.svg', title: 'Wim Hof: The ice man breathes',      duration: '3:15', sparks: 2 },
    ],
  },
  'feel-good': {
    title: 'Feel good',
    videos: [
      { bg: '#f8b3b8', art: './components/carousel-01.svg', title: 'Gratitude unlock: 3 minutes',       duration: '3:00', sparks: 1 },
      { bg: '#c8efd8', art: './components/carousel-03.svg', title: 'Mel Robbins: The high five habit',   duration: '1:30', sparks: 1 },
      { bg: '#fde8d0', art: './components/carousel-04.svg', title: 'Body scan for self-compassion',      duration: '5:00', sparks: 2 },
      { bg: '#f4c0d0', art: './components/carousel-05.svg', title: 'Dance break: just 2 minutes',        duration: '2:00', sparks: 1 },
    ],
  },
  'focus': {
    title: 'Focus',
    videos: [
      { bg: '#b8c0ed', art: './components/carousel-02.svg', title: 'Deep work: single task flow',        duration: '2:00', sparks: 1 },
      { bg: '#8898d8', art: './components/carousel-03.svg', title: 'Huberman: Eye focus drill',          duration: '1:45', sparks: 1 },
      { bg: '#6878b8', art: './components/carousel-04.svg', title: 'Pomodoro intro with Ali Abdaal',     duration: '3:00', sparks: 2 },
      { bg: '#98a8c8', art: './components/carousel-01.svg', title: '4-7-8 breath for mental clarity',    duration: '2:30', sparks: 1 },
    ],
  },
  'wind-down': {
    title: 'Wind down',
    videos: [
      { bg: '#c4a3ff', art: './components/carousel-01.svg', title: 'Sleep story: forest at dusk',        duration: '5:00', sparks: 2 },
      { bg: '#d8b8f0', art: './components/carousel-02.svg', title: 'Matthew Walker: Wind-down ritual',   duration: '2:30', sparks: 1 },
      { bg: '#a880e8', art: './components/carousel-03.svg', title: 'Yoga nidra: full body let go',       duration: '8:00', sparks: 3 },
      { bg: '#8060c0', art: './components/carousel-05.svg', title: 'Phone-free evening: 10 tips',        duration: '1:30', sparks: 1 },
    ],
  },
};

const params = new URLSearchParams(location.search);
const catKey = params.get('cat') || 'boost-energy';
const cat = CATEGORIES[catKey] || CATEGORIES['boost-energy'];

document.getElementById('catTitle').textContent = cat.title;
document.title = 'Blueprint — ' + cat.title;

const grid = document.getElementById('catGrid');
const rows = [cat.videos.slice(0, 2), cat.videos.slice(2, 4)];

rows.forEach((row, ri) => {
  const rowEl = document.createElement('div');
  rowEl.className = 'cat-row';
  row.forEach((v, ci) => {
    const vid = catKey + '-' + (ri * 2 + ci);
    const div = document.createElement('div');
    div.className = 'cat-tile';
    div.style.background = v.bg;
    div.innerHTML = `
      <div class="cat-tile-art"><img src="${v.art}" alt=""></div>
      <div class="cat-heart" data-vid="${vid}" onclick="toggleHeart(this)">
        <img src="./components/heart-default.svg" alt="save">
      </div>
      <div class="cat-info">
        <div class="cat-info-meta">
          <span>${v.duration}</span>
          <span class="cat-info-sparks">${v.sparks} <img src="./components/spark.svg" alt="spark"></span>
        </div>
        <p class="cat-info-title">${v.title}</p>
      </div>`;
    rowEl.appendChild(div);
  });
  grid.appendChild(rowEl);
});

function toggleHeart(btn) {
  const img = btn.querySelector('img');
  if (btn.classList.contains('saved')) {
    btn.classList.remove('saved');
    img.src = './components/heart-default.svg';
  } else {
    btn.classList.add('saved');
    img.src = './components/heart-saved.svg';
  }
}
</script>
</body>
</html>
