<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Mood Check-in</title>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px;
  position: relative; overflow: hidden;
  border-radius: 20px;
  transform-origin: center center;
  transform: scale(var(--s, 1));
  background: #1f1f25;
}

/* ─── Screen transitions ────────────────────────────────────── */
.screen {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 260ms cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ─── Status bar ────────────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.9); z-index: 20; pointer-events: none;
}

/* ─── Progress bar ──────────────────────────────────────────── */
.prog {
  position: absolute; top: 36px; left: 219px;
  width: 756px; height: 4px;
  background: #444450; border-radius: 99px;
  overflow: hidden; z-index: 20; pointer-events: none;
}
.prog-fill {
  height: 100%; background: #f2f3e5; border-radius: 99px;
  transition: width 400ms cubic-bezier(0.22,1,0.36,1);
}


/* ══════════════════════════════════════════════════════════════
   S0 — Emotion picker
   ══════════════════════════════════════════════════════════════ */
#s0 { background: #1f1f25; }

.mc-wrap {
  position: absolute; top: 76px; left: 50%;
  transform: translateX(-50%); width: 770px; text-align: center;
}
.mc-title {
  font-family: var(--font-display);
  font-size: var(--title-large-size); line-height: var(--title-large-lh); letter-spacing: 0;
  color: #f2f3e5; margin: 0 0 10px;
}
.mc-sub {
  font-family: var(--font-body); font-size: var(--label-medium-size); font-weight: var(--fw-bold);
  color: #a4a59f; margin: 0 0 41px;
}

.em-grid {
  display: grid; grid-template-columns: repeat(5, 120px); gap: 20px;
  width: 680px; margin: 0 auto;
}
.em-btn {
  position: relative; border: none; background: none; padding: 0;
  cursor: pointer; width: 120px; height: 120px;
}
.em-btn img {
  width: 100%; height: 100%; display: block; object-fit: contain;
  transition: filter 180ms;
}
.em-btn span {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: var(--subtitle-xsmall-size); letter-spacing: var(--ls-normal);
  text-transform: uppercase; color: #1f1f25;
  line-height: var(--lh-snug); text-align: center; padding: 0 8px; pointer-events: none;
}
.em-check {
  position: absolute; top: 5px; right: 5px;
  width: 36px; height: 36px;
  display: none; place-items: center; z-index: 5; pointer-events: none;
}
.em-check img { width: 100%; height: 100%; display: block; }
.em-btn.sel .em-check { display: grid; }
.em-btn[data-key="curious"] span { padding-bottom: 5px; }
.em-btn[data-key="angry"] span { padding-top: 10px; }
.em-btn[data-key="sad"] span { padding-bottom: 5px; }
.em-btn[data-key="grateful"] span { padding-bottom: 5px; }
.em-btn[data-key="stressed"] span { padding-bottom: 40px; }
.em-btn[data-key="tired"] span { padding-top: 10px; }

.em-grid.maxed .em-btn:not(.sel) { pointer-events: none; cursor: default; }
.em-grid.maxed .em-btn:not(.sel) img { filter: brightness(0.35) saturate(0.4); }
.em-grid.maxed .em-btn:not(.sel) span { color: rgba(242,243,229,0.4); }

.mc-cta {
  position: absolute; bottom: 56px; left: 50%;
  transform: translateX(-50%); z-index: 20;
}

@keyframes mc-enter {
  from { transform: translateX(-50%) translateY(300px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
}
@keyframes mc-enter-grid {
  from { opacity: 0; transform: translateX(-50%) translateY(300px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.mc-wrap {
  animation: mc-enter-grid 800ms cubic-bezier(0.75,0,0.3,0.99) both;
}
.mc-cta {
  animation: mc-enter 800ms cubic-bezier(0.75,0,0.3,0.99) 100ms both;
}
.btn-continue {
  width: 270px; height: 48px;
  background: #f2f3e5; color: #1f1f25;
  font-family: var(--font-body); font-size: var(--label-medium-size); font-weight: var(--fw-bold);
  border-radius: var(--radius-sm); border: none; cursor: pointer; transition: opacity 120ms;
}
.btn-continue:active { opacity: 0.85; }


/* ══════════════════════════════════════════════════════════════
   Detail screens
   ══════════════════════════════════════════════════════════════ */
.ed-screen { background: #1f1f25; }

/* Full-screen emotion shape background */
.ed-shape {
  position: absolute; left: -1px; top: -264px;
  width: 1196px; height: 1196px;
  pointer-events: none; z-index: 0;
}
.ed-shape img { width: 100%; height: 100%; display: block; }

/* Title */
.ed-title {
  position: absolute; top: 60px; left: 0; right: 0;
  font-family: var(--font-display);
  font-size: var(--title-large-size); line-height: var(--title-large-lh); letter-spacing: 0;
  color: var(--colors-neutral-warm-50);
  text-align: center; margin: 0; z-index: 5;
}

/* Arc slider */
.arc-slider {
  position: relative; width: 532px; height: 248px;
  overflow: visible; outline: none;
  cursor: grab; -webkit-user-select: none; user-select: none;
}
.arc-slider.is-dragging { cursor: grabbing; }
.arc-slider svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
.arc-slider__hit { position: absolute; inset: 0; }
.arc-slider__thumb {
  position: absolute; width: 104px; height: 104px; border-radius: 50%;
  background: #2f2f37; border: 10px solid #2f2f37;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; line-height: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: none; will-change: left, top, transform;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,.5));
  transition: none;
}
.arc-slider__thumb.is-snapping {
  transition: left .4s cubic-bezier(.34,1.56,.64,1), top .4s cubic-bezier(.34,1.56,.64,1);
}
.arc-slider.is-dragging .arc-slider__thumb {
  transform: translate(-50%, -50%) scale(1.06);
  transition: transform .12s ease;
}
.arc-slider__pill {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  background: #2f2f37; border-radius: 99px; padding: 0 24px;
  min-width: 160px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.arc-slider__pill span {
  color: var(--colors-neutral-warm-50); font-family: var(--font-body);
  font-size: var(--label-medium-size); font-weight: var(--fw-bold); line-height: var(--lh-normal); text-align: center;
}

.ed-slider-wrap {
  position: absolute; top: 223px; left: 50%;
  transform: translateX(-50%); z-index: 5;
}

/* More specifically + chips */
.ed-chips-section {
  position: absolute; top: 530px; left: 50%;
  transform: translateX(-50%); text-align: center; z-index: 5;
  width: 700px;
}
.ed-chips-label {
  font-family: var(--font-body); font-size: var(--label-small-size); font-weight: var(--fw-semi);
  color: var(--colors-gray-100); margin: 0 0 12px;
}
.ed-chips-label span { color: #a4a59f; }
.ed-chips {
  display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
}
.chip {
  height: 36px; padding: 0 16px;
  border: 1px solid #444450; border-radius: 99px;
  background: #2f2f37; color: #f2f3e5;
  font-family: var(--font-body); font-size: var(--label-small-size); font-weight: var(--fw-semi);
  cursor: pointer; white-space: nowrap;
  transition: background 160ms, color 160ms, border-color 160ms;
}
.chip.sel { border-color: transparent; color: #1f1f25; }

/* Navigation */
.ed-nav {
  position: absolute; bottom: 56px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px; z-index: 20;
}
.btn-back-dark {
  width: 48px; height: 48px; border-radius: 8px;
  background: rgba(255,255,255,0.12);
  border: none; cursor: pointer; display: grid; place-items: center;
  transition: opacity 120ms;
}
.btn-back-dark:active { opacity: 0.75; }
.btn-next-em {
  width: 200px; height: 48px;
  background: #f2f3e5; color: #1f1f25;
  font-family: var(--font-body); font-size: var(--label-medium-size); font-weight: var(--fw-bold);
  border-radius: 8px; border: none; cursor: pointer; transition: opacity 120ms;
}
.btn-next-em:active { opacity: 0.85; }


/* ══════════════════════════════════════════════════════════════
   Why screen
   ══════════════════════════════════════════════════════════════ */
.why-screen { background: #1f1f25; }

.why-deco {
  position: absolute; pointer-events: none; z-index: 0;
}
.why-deco img { width: 100%; height: 100%; display: block; object-fit: contain; }
/* top-left — emotion 1 in all cases */
.why-deco-tl { left: -245px; top: -130px; width: 425px; height: 425px; }
/* mid-right — emotion 2 in 3-emotion case */
.why-deco-mr { left: 1033px; top: 251px; width: 492px; height: 492px; }
/* bottom-left — emotion 3 in 3-emotion case, and only shape in 1-emotion case */
.why-deco-bl { left: -4px; top: 722px; width: 467px; height: 467px; transform: rotate(30deg); }
/* bottom-right — emotion 2 in 2-emotion case */
.why-deco-br { left: 919px; top: 537px; width: 492px; height: 492px; }

/* Also style the unused static ed-bg decorations */
.ed-bg {
  position: absolute; width: 380px; height: 380px;
  pointer-events: none; z-index: 0; opacity: 0.9;
}
.ed-bg img { width: 100%; height: 100%; display: block; object-fit: contain; }
.ed-bg-tl { top: -80px; left: -80px; }
.ed-bg-br { bottom: -80px; right: -80px; }

.why-title {
  position: absolute; top: 68px; left: 0; right: 0; padding: 0 200px;
  font-family: var(--font-display); font-size: var(--title-medium-size); line-height: var(--title-medium-lh);
  letter-spacing: 1px; color: #f2f3e5;
  text-align: center; margin: 0; z-index: 5;
}
.why-grid {
  position: absolute; top: 278px; left: 50%; transform: translateX(-50%);
  width: 764px; z-index: 5;
  display: grid; grid-template-columns: repeat(4, 179px); gap: 16px;
}
.why-block {
  background: #2f2f37; border: 1px solid rgba(92,92,101,0.3); border-radius: 8px;
  height: 94px; width: 179px; padding: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
  transition: background 160ms, border-color 160ms;
}
.why-block:hover { background: #3a3a44; }
.why-block.sel { background: #3a3a44; border: 3px solid #f2f3e5; }
.why-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  background: #2b2b32; border: 1px solid rgba(92,92,101,0.3);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.why-emoji { font-size: 18px; line-height: 1; }
.why-label {
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  color: #f2f3e5; text-align: center; line-height: 1.3;
}


/* ══════════════════════════════════════════════════════════════
   Support offer screen
   ══════════════════════════════════════════════════════════════ */
.support-content {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 760px; text-align: center; z-index: 5;
  display: flex; flex-direction: column; gap: 20px; align-items: center;
}
.support-sub {
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: #a4a59f; margin: 0; line-height: 1.4;
}
.support-heading {
  font-family: var(--font-display); font-size: 64px; line-height: 1.06;
  letter-spacing: 1px; color: #f2f3e5; margin: 0;
}
.support-btns {
  position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 16px; z-index: 5;
}
.btn-maybe {
  width: 260px; height: 48px; background: #2b2b32;
  border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  color: #f2f3e5; cursor: pointer; transition: opacity 120ms;
}
.btn-show {
  width: 260px; height: 48px; background: #f2f3e5;
  border: none; border-radius: 8px;
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  color: #1f1f25; cursor: pointer; transition: opacity 120ms;
}
.btn-maybe:active, .btn-show:active { opacity: 0.75; }

/* ══════════════════════════════════════════════════════════════
   Help / Support screens — blue Pillow design
   ══════════════════════════════════════════════════════════════ */
.help-back {
  position: absolute; left: 24px; top: 48px;
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.16);
  border: none; border-radius: 8px; cursor: pointer;
  display: grid; place-items: center; z-index: 20;
}
.help-content {
  position: absolute; top: 293px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 16px; align-items: center;
  z-index: 5; text-align: center;
}
.help-sub {
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  color: #f2f3e5; letter-spacing: -0.1px; margin: 0; width: 357px;
}
.help-heading {
  font-family: var(--font-display); font-size: 64px; line-height: 1.06;
  letter-spacing: 0; color: #f2f3e5; margin: 0; width: 613px;
}
.help-btns {
  position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 24px; z-index: 20;
}
.btn-help-secondary {
  width: 270px; height: 48px; border-radius: 8px; border: none; cursor: pointer;
  background: rgba(255,255,255,0.16);
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  color: #ededed; transition: opacity 120ms;
}
.btn-help-primary {
  width: 270px; height: 48px; border-radius: 8px; border: none; cursor: pointer;
  background: #f2f3e5; color: #1f1f25;
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  box-shadow: 0 1px 1px rgba(20,21,26,0.03); transition: opacity 120ms;
}
.btn-help-secondary:active, .btn-help-primary:active { opacity: 0.8; }

/* Showing up counts screen */
.scounts-spark {
  position: absolute; top: 274px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; align-items: center; z-index: 5;
}
.scounts-plus {
  font-family: var(--font-display); font-size: 32px;
  line-height: 40px; letter-spacing: -0.8px; color: #f2f3e5;
}
.scounts-title {
  position: absolute; top: 326px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-display); font-size: 80px; line-height: 1.06;
  letter-spacing: 0; color: #f2f3e5; text-align: center;
  width: 406px; margin: 0; z-index: 5;
}
.scounts-bubble {
  position: absolute; top: 512px; left: 50%; transform: translateX(-50%);
  width: 439px; padding: 10px;
  background: #58b880;
  display: flex; align-items: flex-start; gap: 12px;
  z-index: 5;
}
.scounts-bubble-avatar {
  width: 48px; height: 48px; flex-shrink: 0;
  background: #f2f3e5; overflow: hidden;
  display: grid; place-items: center;
}
.scounts-bubble-avatar img { width: 40px; height: 40px; display: block; object-fit: cover; }
.scounts-bubble-text {
  font-family: var(--font-body); font-size: 20px; font-weight: 500;
  color: #2f2f37; line-height: 1.1; letter-spacing: -0.4px;
  flex: 1; padding-top: 4px;
}

/* ══════════════════════════════════════════════════════════════
   Video player screen
   ══════════════════════════════════════════════════════════════ */
.video-play-wrap {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 5;
}
.video-play-btn {
  background: none; border: none; cursor: pointer; padding: 0;
  transition: opacity 120ms;
}
.video-play-btn:active { opacity: 0.7; }
.video-tap-hint {
  font-family: var(--font-body); font-size: 13px; color: rgba(255,255,255,0.4);
  margin: 0;
}

/* ══════════════════════════════════════════════════════════════
   Video feedback screen
   ══════════════════════════════════════════════════════════════ */
.vfb-ellipse {
  position: absolute; left: -351px; top: 150px;
  width: 1910px; height: 1910px; border-radius: 50%;
  background: #1f1f25; pointer-events: none; z-index: 0;
}
.vfb-main-content {
  position: absolute; left: 291px; top: 230px;
  width: 613px; z-index: 5; text-align: center;
}
.vfb-title {
  font-family: var(--font-display); font-size: 56px; line-height: 1.06;
  letter-spacing: 1px; color: #f2f3e5; margin: 16px 0 0;
}
.vfb-bubble {
  position: absolute; z-index: 6;
  width: 370px; padding: 10px;
  display: flex; align-items: flex-start; gap: 12px;
}
.vfb-bubble-green  { background: #58b880; left: 50%; top: 452px; transform: translateX(-50%); }
.vfb-bubble-avatar {
  width: 48px; height: 48px; flex-shrink: 0;
  overflow: hidden; background: #f2f3e5;
}
.vfb-bubble-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.vfb-bubble-text {
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  color: #2f2f37; line-height: 1.4; padding-top: 4px;
}
.vfb-cta-wrap {
  position: absolute; bottom: 64px; left: 50%;
  transform: translateX(-50%); z-index: 20;
  display: flex; gap: 12px;
}
.vfb-btn-no {
  height: 44px; padding: 0 28px; background: #2b2b32;
  border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: #f2f3e5; cursor: pointer; transition: opacity 120ms;
}
.vfb-btn-yes {
  height: 44px; padding: 0 28px; background: #f2f3e5;
  border: none; border-radius: 8px;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: #1f1f25; cursor: pointer; transition: opacity 120ms;
}
.vfb-btn-no:active, .vfb-btn-yes:active { opacity: 0.75; }


/* ══════════════════════════════════════════════════════════════
   Sleep screen
   ══════════════════════════════════════════════════════════════ */
#s-sleep { background: #3f50b8; }

.sleep-sub {
  position: absolute; top: 60px; left: 0; right: 0;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: #a4a59f; text-align: center; z-index: 5;
}
.sleep-title {
  position: absolute; top: 88px; left: 0; right: 0;
  font-family: var(--font-display); font-size: var(--title-medium-size); line-height: var(--title-medium-lh);
  letter-spacing: 1px; color: #f2f3e5;
  text-align: center; margin: 0; z-index: 5;
}
.sleep-slider-wrap {
  position: absolute; top: 272px; left: 50%; transform: translateX(-50%); z-index: 5;
}


/* ══════════════════════════════════════════════════════════════
   Done screen
   ══════════════════════════════════════════════════════════════ */
#s-done { background: #3f50b8; transition: none; }

.done-ellipse {
  position: absolute; left: -357px; top: 79px;
  width: 1910px; height: 1910px; border-radius: 50%;
  background: #1f1f25; pointer-events: none; z-index: 0;
}

/* ── Sleep exit — content slides down ──────────────────────── */
#s-sleep.s-sleep-exiting .sleep-sub,
#s-sleep.s-sleep-exiting .sleep-title {
  transform: translateY(400px); opacity: 0;
  transition: transform 700ms cubic-bezier(0.75,0,0.3,0.99),
              opacity 400ms ease;
}
#s-sleep.s-sleep-exiting .sleep-slider-wrap {
  transform: translateX(-50%) translateY(400px); opacity: 0;
  transition: transform 700ms cubic-bezier(0.75,0,0.3,0.99),
              opacity 400ms ease;
}
#s-sleep.s-sleep-exiting .ed-nav {
  transform: translateX(-50%) translateY(400px); opacity: 0;
  transition: transform 700ms cubic-bezier(0.75,0,0.3,0.99) 60ms,
              opacity 400ms ease 60ms;
}
#s-sleep.s-sleep-exiting .prog { opacity: 0; transition: opacity 300ms ease; }

.done-center {
  position: absolute; left: 50%; top: calc(50% - 17px);
  transform: translate(-50%, calc(-50% + 200px));
  display: flex; flex-direction: column; align-items: center; gap: 36px; z-index: 5;
  opacity: 0;
}
.done-top-group {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.reward-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.reward-plus {
  font-family: var(--font-display); font-size: 32px;
  line-height: 40px; letter-spacing: -0.8px; color: #f2f3e5;
}
.spark-badge {
  position: relative; width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
}
.spark-badge img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: cover; display: block;
}

@keyframes spark-c2 {

}

}
scale(); addEventListener('resize', scale);

if (new URLSearchParams(location.search).get('edit') === '1') {

// ─── Emotion data ─────────────────────────────────────────────
const EMOTIONS = {

// ─── Screen nav ───────────────────────────────────────────────
let cur = 's0';
let detailOrder = [];

function goToDone() {
  const sleep = document.getElementById('s-sleep');
  const done  = document.getElementById('s-done');

  // Sleep content exits downward
  sleep.classList.add('s-sleep-exiting');

  // After content is sliding, swap screens (same blue bg = seamless)
  setTimeout(() => {
    sleep.classList.remove('active');
    done.classList.add('active');
    cur = 's-done';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      done.classList.add('done-entered');
    }));
  }, 350);
}

function finishMoodCheckin() {
  localStorage.setItem('bp_mood_emotions', JSON.stringify(detailOrder));
  const reasons = [...document.querySelectorAll('#wh-0 .why-block.sel')]
    .map(b => b.querySelector('.why-label').textContent.trim());
  localStorage.setItem('bp_mood_reasons', JSON.stringify(reasons));

  const done = document.getElementById('s-done');
  done.classList.add('done-exiting');
  setTimeout(() => {
    localStorage.setItem('bp_mood_done', '1');
    localStorage.setItem('bp_fresh_start', '1');
    window.location.href = 'today.html';
  }, 700);
}

function goTo(id) {
  document.getElementById(cur).classList.remove('active');
  document.getElementById(id).classList.add('active');
  cur = id;
}

// ─── Emotion picker ───────────────────────────────────────────
const MAX = 3;
const grid = document.getElementById('emGrid');

function toggleEm(el) {
  if (el.classList.contains('sel')) {
    el.classList.remove('sel');
  } else {
    if (document.querySelectorAll('.em-btn.sel').length >= MAX) return;
    el.classList.add('sel');
  }
  grid.classList.toggle('maxed', document.querySelectorAll('.em-btn.sel').length >= MAX);
}

// ─── Build & start detail flow ────────────────────────────────
function startDetailFlow() {
  const selected = [...document.querySelectorAll('.em-btn.sel')].map(el => el.dataset.key);
  if (!selected.length) return;
  detailOrder = selected;
  const device = document.getElementById('device');
  // Remove previously built screens
  document.querySelectorAll('.ed-screen, .why-screen').forEach(s => s.remove());
  // Build one detail screen per emotion
  selected.forEach((key, idx) => {
    const screen = buildDetailScreen(key, idx, selected.length);
    device.appendChild(screen);
    initArc(key);
  });
  // Build one why screen with all selected emotions as background
  device.appendChild(buildWhyScreen(selected));
  goTo('ed-0');
}

// ─── Detail screen builder ────────────────────────────────────
function buildDetailScreen(key, idx, total) {
  const em = EMOTIONS[key];
  const progWidth = 120 + ((idx + 1) / (total * 2 + 2)) * 600;
  const chk = `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7L6 11L12 3" stroke="#1f1f25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const chipsHtml = em.chips.map(c =>
    `<button class="chip" onclick="toggleChip(this,'${em.color}')">${c}</button>`
  ).join('');
  const gradId = `grad-${key}`;

  const div = document.createElement('div');
  div.className = 'screen ed-screen';
  div.id = `ed-${idx}`;
  div.style.background = em.color;
  const sh = em.shape || { size:1495, left:-151, top:-331 };
  div.innerHTML = `
    <div class="ed-shape" style="width:${sh.size}px;height:${sh.size}px;left:${sh.left}px;top:${sh.top}px"><img src="./components/${key}-shape.svg" alt=""></div>

    <div class="sb"><span>9:41 Mon Jun 6</span><span>100% 🔋</span></div>
    <div class="prog"><div class="prog-fill" style="width:${Math.round(progWidth)}px"></div></div>

    <h2 class="ed-title">${em.name}</h2>

    <div class="ed-slider-wrap">
      <div class="arc-slider" id="arc-${key}" tabindex="0">
        <svg viewBox="0 0 532 248" width="532" height="248">
          <defs>
            <linearGradient id="${gradId}" gradientUnits="userSpaceOnUse" x1="48" y1="247" x2="480" y2="247">
              <stop offset="0%" stop-color="${em.color}" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="${em.color}"/>
            </linearGradient>
          </defs>
          <path id="arcTrack-${key}" fill="none" stroke="#2f2f37" stroke-width="49" stroke-linecap="round"/>
          <path id="arcFill-${key}"  fill="none" stroke="url(#${gradId})" stroke-width="49" stroke-linecap="round"/>
          <g id="arcDots-${key}"></g>
        </svg>
        <div class="arc-slider__hit" id="arcHit-${key}"></div>
        <div class="arc-slider__thumb" id="arcThumb-${key}"><span id="arcEmoji-${key}">${em.emoji}</span></div>
        <div class="arc-slider__pill"><span id="arcLabel-${key}"></span></div>
      </div>
    </div>

    <div class="ed-chips-section">
      <p class="ed-chips-label">More specifically <span>(optional)</span></p>

    </div>

      <button class="btn-back-dark" onclick="edBack(${idx})">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 4L7 10L13 16" stroke="#f2f3e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn-next-em" onclick="edNext(${idx}, ${total})">
        ${idx < total - 1 ? 'Next' : 'Done'}
      </button>
    </div>
  `;
  return div;
}

function edBack(idx) {
  if (idx === 0) { goTo('s0'); } else { goTo(`ed-${idx - 1}`); }
}
function edNext(idx, total) {
  if (idx < total - 1) { goTo(`ed-${idx + 1}`); } else { goTo('wh-0'); }
}
function whyBack()  { goTo(`ed-${detailOrder.length - 1}`); }
function whyNext()  { goTo('s-sleep'); }
function goBackFromSleep() { goTo('wh-0'); }

// ─── Why screen builder ───────────────────────────────────────
const WHY_BLOCKS = [
  { emoji: '📚', label: 'School life' },
  { emoji: '✍️', label: 'Exams' },

  { emoji: '🚶', label: 'No friends' },

  1: ['why-deco-bl'],
  2: ['why-deco-tl', 'why-deco-br'],

function buildWhyScreen(selectedKeys) {
  const n = selectedKeys.length;

  const blocksHtml = WHY_BLOCKS.map(b => `
    <button class="why-block" onclick="this.classList.toggle('sel')">
      <div class="why-icon"><span class="why-emoji">${b.emoji}</span></div>
      <span class="why-label">${b.label}</span>

  const div = document.createElement('div');
  div.className = 'screen why-screen';
  div.id = 'wh-0';
  div.innerHTML = `
    ${decosHtml}

    <div class="ed-nav">
      <button class="btn-back-dark" onclick="whyBack()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 4L7 10L13 16" stroke="#f2f3e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn-next-em" onclick="whyNext()">Next</button>
    </div>
  `;
  return div;
}

// ─── Chip toggle ──────────────────────────────────────────────
function toggleChip(el, color) {
  el.classList.toggle('sel');
  el.style.background = el.classList.contains('sel') ? color : '';
}

// ─── Arc slider (3 stops) ─────────────────────────────────────
const ARC_CX = 263, ARC_CY = 247, ARC_RM = 190.5;
const ARC_FILL_START = 175, ARC_TRACK_END = 5;
const ARC_A_MAX = 170, ARC_A_MIN = 10;
const DEG = Math.PI / 180;
const rnd = n => Math.round(n * 10) / 10;

function arcPt(r, deg) {
  return [ARC_CX + r * Math.cos(deg * DEG), ARC_CY - r * Math.sin(deg * DEG)];
}
function arcAng(x, y) {
  return Math.atan2(ARC_CY - y, x - ARC_CX) / DEG;
}
function arcPath(from, to) {
  if (from - to < 0.4) to = from - 0.4;
  const [x1,y1] = arcPt(ARC_RM, from), [x2,y2] = arcPt(ARC_RM, to);
  return `M${rnd(x1)},${rnd(y1)} A${ARC_RM},${ARC_RM} 0 ${(from-to)>=180?1:0},1 ${rnd(x2)},${rnd(y2)}`;
}

function initArc(key) {
  const em = EMOTIONS[key];
  const NS = 'http://www.w3.org/2000/svg';
  const stops3 = [ARC_A_MAX, (ARC_A_MAX + ARC_A_MIN) / 2, ARC_A_MIN]; // left, mid, right

  document.getElementById(`arcTrack-${key}`).setAttribute('d', arcPath(ARC_FILL_START, ARC_TRACK_END));

  const dotsG = document.getElementById(`arcDots-${key}`);
  const dotEls = stops3.map(a => {
    const [dx, dy] = arcPt(ARC_RM, a);
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', rnd(dx)); c.setAttribute('cy', rnd(dy));
    c.setAttribute('r', '7'); c.setAttribute('fill', '#18181f');
    dotsG.appendChild(c);
    return c;
  });

  let arcAngle = stops3[0];

  function arcMove(a) {
    a = Math.max(ARC_A_MIN, Math.min(ARC_A_MAX, a));
    arcAngle = a;
    document.getElementById(`arcFill-${key}`).setAttribute('d', arcPath(ARC_FILL_START, a));
    const [tx, ty] = arcPt(ARC_RM, a);
    const thumb = document.getElementById(`arcThumb-${key}`);
    thumb.style.left = tx + 'px'; thumb.style.top = ty + 'px';
    const nearIdx = stops3.reduce((b, sa, i) => Math.abs(a-sa) < Math.abs(a-stops3[b]) ? i : b, 0);
    document.getElementById(`arcLabel-${key}`).textContent = em.levels[nearIdx];
    document.getElementById(`arcEmoji-${key}`).textContent = em.emojis[nearIdx];
    dotEls.forEach((c, i) => c.setAttribute('fill', i === nearIdx ? 'transparent' : '#18181f'));
  }

  function arcSnap(v, noAnim) {
    const thumb = document.getElementById(`arcThumb-${key}`);
    if (!noAnim) {
      thumb.classList.add('is-snapping');
      thumb.addEventListener('transitionend', () => thumb.classList.remove('is-snapping'), { once: true });
    }
    arcMove(stops3[v]);
  }

  function nearestStop(a) {
    return stops3.reduce((b, sa, i) => Math.abs(a-sa) < Math.abs(a-stops3[b]) ? i : b, 0);
  }

  const sliderEl = document.getElementById(`arc-${key}`);
  const hitEl = document.getElementById(`arcHit-${key}`);
  const thumbEl = document.getElementById(`arcThumb-${key}`);
  let dragging = false;

  function clientToAngle(e) {
    const t = e.touches ? e.touches[0] : e;
    const r = sliderEl.getBoundingClientRect();
    return arcAng(t.clientX - r.left, t.clientY - r.top);
  }
  function onStart(e) { dragging=true; sliderEl.classList.add('is-dragging'); thumbEl.classList.remove('is-snapping'); e.preventDefault(); arcMove(clientToAngle(e)); }
  function onMove(e) { if (!dragging) return; e.preventDefault(); arcMove(clientToAngle(e)); }
  function onEnd()   { if (!dragging) return; dragging=false; sliderEl.classList.remove('is-dragging'); arcSnap(nearestStop(arcAngle)); }

  hitEl.addEventListener('mousedown', onStart);
  thumbEl.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
  hitEl.addEventListener('touchstart', onStart, { passive: false });
  thumbEl.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onEnd);
  sliderEl.addEventListener('keydown', e => {
    const n = nearestStop(arcAngle);
    if (e.key === 'ArrowRight') arcSnap(Math.min(n+1, 2));
    if (e.key === 'ArrowLeft')  arcSnap(Math.max(n-1, 0));
  });

  arcSnap(0, true);
}

// ─── Sleep slider (7 stops) ───────────────────────────────────
const SLEEP_LEVELS = [
  { e:'😩', t:'Trouble\nfalling asleep' },
  { e:'😔', t:'Restless\nsleep' },
  { e:'😕', t:'Light\nsleep' },
  { e:'😐', t:'Okay' },
  { e:'🙂', t:'Pretty\ngood' },
  { e:'😊', t:'Well\nrested' },
  { e:'🌟', t:'Amazing\nsleep' },
];

function initSleepSlider() {
  const NS = 'http://www.w3.org/2000/svg';
  const n = SLEEP_LEVELS.length;
  const stops = SLEEP_LEVELS.map((_, i) => ARC_A_MAX - (i / (n-1)) * (ARC_A_MAX - ARC_A_MIN));

  document.getElementById('arcTrack-sleep').setAttribute('d', arcPath(ARC_FILL_START, ARC_TRACK_END));

  const dotsG = document.getElementById('arcDots-sleep');
  const dotEls = stops.map(a => {
    const [dx, dy] = arcPt(ARC_RM, a);
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', rnd(dx)); c.setAttribute('cy', rnd(dy));
    c.setAttribute('r', '6'); c.setAttribute('fill', '#18181f');
    dotsG.appendChild(c); return c;
  });

  let arcAngle = stops[0];
  function arcMove(a) {
    a = Math.max(ARC_A_MIN, Math.min(ARC_A_MAX, a)); arcAngle = a;
    document.getElementById('arcFill-sleep').setAttribute('d', arcPath(ARC_FILL_START, a));
    const [tx, ty] = arcPt(ARC_RM, a);
    const thumb = document.getElementById('arcThumb-sleep');
    thumb.style.left = tx+'px'; thumb.style.top = ty+'px';
    const ni = stops.reduce((b,sa,i) => Math.abs(a-sa)<Math.abs(a-stops[b])?i:b, 0);
    document.getElementById('arcEmoji-sleep').textContent = SLEEP_LEVELS[ni].e;
    document.getElementById('arcLabel-sleep').innerHTML = SLEEP_LEVELS[ni].t.replace('\n','<br>');
    dotEls.forEach((c,i) => c.setAttribute('fill', i===ni?'transparent':'#18181f'));
  }
  function arcSnap(v, noAnim) {
    const thumb = document.getElementById('arcThumb-sleep');
    if (!noAnim) { thumb.classList.add('is-snapping'); thumb.addEventListener('transitionend', ()=>thumb.classList.remove('is-snapping'),{once:true}); }
    arcMove(stops[v]);
  }
  function nearest(a) { return stops.reduce((b,sa,i)=>Math.abs(a-sa)<Math.abs(a-stops[b])?i:b,0); }

  const sliderEl = document.getElementById('arc-sleep');
  const hitEl = document.getElementById('arcHit-sleep');
  const thumbEl = document.getElementById('arcThumb-sleep');
  let dragging = false;
  function cta(e) { const t=e.touches?e.touches[0]:e; const r=sliderEl.getBoundingClientRect(); return arcAng(t.clientX-r.left,t.clientY-r.top); }
  function onStart(e){dragging=true;sliderEl.classList.add('is-dragging');thumbEl.classList.remove('is-snapping');e.preventDefault();arcMove(cta(e));}
  function onMove(e){if(!dragging)return;e.preventDefault();arcMove(cta(e));}
  function onEnd(){if(!dragging)return;dragging=false;sliderEl.classList.remove('is-dragging');arcSnap(nearest(arcAngle));}
  hitEl.addEventListener('mousedown',onStart); thumbEl.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onEnd);
  hitEl.addEventListener('touchstart',onStart,{passive:false}); thumbEl.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onEnd);
  sliderEl.addEventListener('keydown',e=>{ const ni=nearest(arcAngle); if(e.key==='ArrowRight')arcSnap(Math.min(ni+1,n-1)); if(e.key==='ArrowLeft')arcSnap(Math.max(ni-1,0)); });
  arcSnap(0, true);
}

initSleepSlider();
</script>
