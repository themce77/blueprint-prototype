<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Today</title>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px; position: relative; overflow: hidden;
  border-radius: 20px; transform-origin: center center;
  transform: scale(var(--s,1)); background: #1f1f25;
}

/* ─── Status bar ────────────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.9); pointer-events: none;
}

/* ─── Layout ────────────────────────────────────────────────── */
.today-layout {
  position: absolute; top: 24px; left: 0; right: 0; bottom: 0;
  display: flex;
}

/* ─── Sidebar ───────────────────────────────────────────────── */
.today-sidebar {
  width: 62px; flex-shrink: 0;
  background: #111116;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0 16px;
}
.sidebar-logo {
  font-family: var(--font-body); font-size: 8px; font-weight: 700;
  letter-spacing: 1px; color: #a4a59f; text-transform: uppercase;
  writing-mode: vertical-rl; transform: rotate(180deg);
  margin-bottom: 20px; height: 56px; flex-shrink: 0;
}
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; width: 100%; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 0; cursor: pointer; border-radius: 8px;
  transition: background 140ms;
}
.nav-item:hover { background: rgba(255,255,255,0.06); }
.nav-item.active { background: rgba(255,255,255,0.1); }
.nav-icon { width: 22px; height: 22px; display: grid; place-items: center; }
.nav-icon svg { width: 18px; height: 18px; }
.nav-label {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  color: #a4a59f; text-align: center; line-height: 1;
}
.nav-item.active .nav-label { color: #f2f3e5; }

.sidebar-user {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  margin-top: 12px; flex-shrink: 0;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: #3f50b8; display: grid; place-items: center; font-size: 16px;
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.user-name {
  font-family: var(--font-body); font-size: 9px; font-weight: 600; color: #a4a59f;
}

/* ─── Main content ──────────────────────────────────────────── */
.today-main {
  flex: 1; display: flex; flex-direction: column;
  padding: 24px 40px 28px; position: relative; min-width: 0;
}

.today-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px; flex-shrink: 0;
}
.today-greeting h1 {
  font-family: var(--font-display); font-size: 60px; line-height: 1.0;
  letter-spacing: 1px; text-transform: uppercase; color: #f2f3e5;
  margin: 0 0 6px;
}
.today-greeting p {
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: #a4a59f; margin: 0;
}
.today-sparks-widget {
  flex-shrink: 0; background: #2f2f37; border-radius: 14px;
  padding: 14px 20px 14px 16px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  min-width: 120px;
}
.sparks-label { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: #a4a59f; }
.sparks-total {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-display); font-size: 40px; line-height: 1;
  color: #f2f3e5; letter-spacing: -0.5px;
}
.spark-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg,#f08b31,#ffbb25);
  display: grid; place-items: center; font-size: 14px; flex-shrink: 0;
}

/* ─── Cards row ─────────────────────────────────────────────── */
.today-cards {
  display: flex; gap: 14px; flex: 1; min-height: 0;
  align-items: flex-start;
}

/* ─── Single card ───────────────────────────────────────────── */
.t-card {
  flex: 1; position: relative; border-radius: 19px; overflow: hidden;
  min-width: 0;
  /* Lock to SVG aspect ratio — 237 wide × 353 tall */
  aspect-ratio: 237 / 353;
  transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1);
}

/* SVG art fills the card completely */
.card-img {
  width: 100%; height: 100%;
  display: block; object-fit: fill;
  border-radius: 19px;
  transition: filter 350ms ease;
}

/* ─── State overlays ────────────────────────────────────────── */
.card-overlay {
  position: absolute; inset: 0; border-radius: 19px;
  pointer-events: none; transition: opacity 350ms;
}

/* Queued: full color, only badge distinguishes state */

/* Done: dark overlay */
.card-done-cover {
  position: absolute; inset: 0; border-radius: 19px;
  background: rgba(10,10,15,0.80);
  opacity: 0; transition: opacity 350ms; pointer-events: none;
}
.t-card.done .card-done-cover { opacity: 1; }

/* Done checkmark */
.card-check {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 56px; height: 56px; border-radius: 50%;
  background: #f2f3e5;
  display: grid; place-items: center; z-index: 6; pointer-events: none;
  transition: transform 300ms cubic-bezier(0.34,1.56,0.64,1) 80ms;
}
.t-card.done .card-check { transform: translate(-50%,-50%) scale(1); }
.t-card.done-green .card-check { background: #4ecb9e; }
/* Pre-done (mood check-in, completed before this session) — gray, no animation */
.t-card.pre-done .card-check {
  background: #5a5a6a;
  transition: none;
  transform: translate(-50%,-50%) scale(1);
}
.t-card.pre-done .card-done-cover { background: rgba(10,10,15,0.70); transition: none; opacity: 1; }
.t-card.pre-done .card-check svg path { stroke: #a4a59f; }

/* ─── State badge ───────────────────────────────────────────── */
.card-badge {
  position: absolute; top: 14px; right: 14px; z-index: 7;
  width: 38px; height: 38px; border-radius: 50%;
  display: grid; place-items: center;
  transition: opacity 250ms, transform 250ms;
  pointer-events: none;
}

/* Awake badge — white fill */
.badge-awake {
  background: #f2f3e5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}

/* Sleepy badge — dark translucent */
.badge-sleepy {
  background: rgba(30,30,38,0.75);
  backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,0.12);
}

/* Hide badges when done */
.t-card.done .card-badge { opacity: 0; transform: scale(0.7); }

/* ─── Active card interactions ──────────────────────────────── */
.t-card.active { cursor: pointer; }
.t-card.active:hover { transform: scale(1.025); }
.t-card.queued { cursor: default; }
.t-card.done   { cursor: default; }

/* ─── Footer ────────────────────────────────────────────────── */
.today-footer {
  display: flex; justify-content: center; padding-top: 14px; flex-shrink: 0;
}
.btn-summary {
  height: 46px; padding: 0 48px;
  background: rgba(255,255,255,0.08); color: #f2f3e5;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.12);
  cursor: pointer; transition: opacity 120ms;
}
.btn-summary:active { opacity: 0.7; }

</style>
</head>
<body>

<div class="bp-stage">
<div class="bp-device" id="device">

  <div class="sb"><span>9:41 Mon Jun 6</span><span>100% 🔋</span></div>

  <div class="today-layout">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <nav class="today-sidebar">
      <div class="sidebar-logo">Sparks EQ</div>
      <div class="sidebar-nav">
        <div class="nav-item active">
          <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#f2f3e5" stroke-width="1.8"/><path d="M10 6v4l2.5 2.5" stroke="#f2f3e5" stroke-width="1.8" stroke-linecap="round"/></svg></div>
          <span class="nav-label">Today</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="#a4a59f" stroke-width="1.8"/><path d="M7 7h6M7 10h6M7 13h4" stroke="#a4a59f" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          <span class="nav-label">Journal</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="12" height="10" rx="2" stroke="#a4a59f" stroke-width="1.8"/><path d="M14 8l4-2v8l-4-2V8z" stroke="#a4a59f" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
          <span class="nav-label">My toolkit</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M3 17l4-8 4 4 3-5 3 9" stroke="#a4a59f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="nav-label">Journey</span>
        </div>
        <div class="nav-item">
          <div class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2l2.4 5 5.6.8-4 3.9.9 5.5L10 14.5l-4.9 2.7.9-5.5-4-3.9 5.6-.8L10 2z" stroke="#a4a59f" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
          <span class="nav-label">Sparks</span>
        </div>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar">😊</div>
        <span class="user-name">Sophie</span>
      </div>
    </nav>

    <!-- ── Main ───────────────────────────────────────────── -->
    <main class="today-main">

      <div class="today-header">
        <div class="today-greeting">
          <h1 id="greetTitle">Hi Sophie!</h1>
          <p id="greetSub">You've had 100% attendance this week.</p>
        </div>
        <div class="today-sparks-widget">
          <span class="sparks-label">Total</span>
          <div class="sparks-total">220<div class="spark-icon">⚡</div></div>
        </div>
      </div>

      <div class="today-cards" id="cardRow">

        <!-- Mood check-in — always pre-done (completed at start of session) -->
        <div class="t-card done pre-done" id="card-mood">
          <img class="card-img" src="./components/card-2.svg" alt="Mood check-in">
          <div class="card-done-cover"></div>
          <div class="card-check">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 12L10 18L20 6" stroke="#1f1f25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>

        <!-- Notice your wins — active (first task) -->
        <div class="t-card active" id="card-wins" onclick="openFlow('notice-wins.html')">
          <img class="card-img" src="./components/card-1.svg" alt="Notice your wins">
          <div class="card-done-cover"></div>
          <div class="card-check">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 12L10 18L20 6" stroke="#1f1f25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <!-- Awake badge -->
          <div class="card-badge badge-awake">
            <svg width="22" height="14" viewBox="0 0 22 14" fill="none">
              <path d="M1 7C2.5 3 5.5 1 8 1C10.5 1 12 3 13 7C12 11 10.5 13 8 13C5.5 13 2.5 11 1 7Z" fill="#1f1f25"/>
              <circle cx="8" cy="7" r="2.5" fill="#f2f3e5"/>
              <path d="M9 7C10.5 3 13.5 1 16 1C18.5 1 20 3 21 7C20 11 18.5 13 16 13C13.5 13 10.5 11 9 7Z" fill="#1f1f25"/>
              <circle cx="16" cy="7" r="2.5" fill="#f2f3e5"/>
            </svg>
          </div>
        </div>

        <!-- Write it out — queued -->
        <div class="t-card queued" id="card-write">
          <img class="card-img" src="./components/card-4.svg" alt="Write it out">
          <div class="card-done-cover"></div>
          <div class="card-check">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 12L10 18L20 6" stroke="#1f1f25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <!-- Sleepy badge -->
          <div class="card-badge badge-sleepy">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
              <path d="M1 5 Q4 2.5 7 5" stroke="#f2f3e5" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M11 5 Q14 2.5 17 5" stroke="#f2f3e5" stroke-width="1.5" stroke-linecap="round"/>
              <text x="5" y="15" font-size="6.5" fill="#f2f3e5" font-family="-apple-system,sans-serif" font-weight="700">zzz</text>
            </svg>
          </div>
        </div>

        <!-- All about you — queued -->
        <div class="t-card queued" id="card-about">
          <img class="card-img" src="./components/card-6.svg" alt="All about you">
          <div class="card-done-cover"></div>
          <div class="card-check">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 12L10 18L20 6" stroke="#1f1f25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <!-- Sleepy badge -->
          <div class="card-badge badge-sleepy">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
              <path d="M1 5 Q4 2.5 7 5" stroke="#f2f3e5" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M11 5 Q14 2.5 17 5" stroke="#f2f3e5" stroke-width="1.5" stroke-linecap="round"/>
              <text x="5" y="15" font-size="6.5" fill="#f2f3e5" font-family="-apple-system,sans-serif" font-weight="700">zzz</text>
            </svg>
          </div>
        </div>

      </div>

      <div class="today-footer">
        <button class="btn-summary">View summary</button>
      </div>

    </main>
  </div>

</div>
</div>

<script>
function scale() {
  const s = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  document.getElementById('device').style.setProperty('--s', s);
}
scale(); addEventListener('resize', scale);

// Load selected avatar from onboarding
(function() {
  const src = localStorage.getItem('bp_avatar');
  const bg  = localStorage.getItem('bp_avatar_bg');
  const el  = document.querySelector('.user-avatar');
  if (src && el) {
    if (bg) el.style.background = bg;
    el.innerHTML = '<img src="' + src + '" alt="avatar">';
  }
})();

// Queue order (mood is already done on arrival)
// card id → flow URL
const FLOWS = {
  'card-wins':  'notice-wins.html',
  'card-write': null,   // TODO
  'card-about': null,   // TODO
};
const queue = ['card-wins', 'card-write', 'card-about'];

function openFlow(url) {
  if (url) {
    window.location.href = url;
  }
}

function completeCard(id) {
  const card = document.getElementById(id);
  if (!card.classList.contains('active')) return;

  card.classList.remove('active');
  card.classList.add('done');

  // Advance queue: next queued becomes active
  const nextIdx = queue.indexOf(id) + 1;
  if (nextIdx < queue.length) {
    const next = document.getElementById(queue[nextIdx]);
    next.classList.remove('queued');
    next.classList.add('active');
    const nextFlow = FLOWS[queue[nextIdx]];
    next.setAttribute('onclick', nextFlow ? `openFlow('${nextFlow}')` : `completeCard('${queue[nextIdx]}')`);
    // Swap badge to awake
    const badge = next.querySelector('.card-badge');
    if (badge) {
      badge.classList.remove('badge-sleepy');
      badge.classList.add('badge-awake');
      badge.innerHTML = `<svg width="22" height="14" viewBox="0 0 22 14" fill="none">
        <path d="M1 7C2.5 3 5.5 1 8 1C10.5 1 12 3 13 7C12 11 10.5 13 8 13C5.5 13 2.5 11 1 7Z" fill="#1f1f25"/>
        <circle cx="8" cy="7" r="2.5" fill="#f2f3e5"/>
        <path d="M9 7C10.5 3 13.5 1 16 1C18.5 1 20 3 21 7C20 11 18.5 13 16 13C13.5 13 10.5 11 9 7Z" fill="#1f1f25"/>
        <circle cx="16" cy="7" r="2.5" fill="#f2f3e5"/>
      </svg>`;
    }
  } else {
    checkAllDone();
  }
}

function checkAllDone() {
  const all = document.querySelectorAll('.t-card');
  const allDone = [...all].every(c => c.classList.contains('done'));
  if (!allDone) return;

  all.forEach(c => c.classList.add('done-green'));
  document.getElementById('greetTitle').textContent = 'Mission completed!';
  document.getElementById('greetTitle').style.fontSize = '52px';
  document.getElementById('greetSub').textContent = 'Congratulations, Sophie!';
  document.getElementById('greetSub').style.color = '#4ecb9e';
}

// Handle returns from card flows
const doneFlags = {
  'bp_wins_done':  'card-wins',
  'bp_mood_done':  'card-mood',
};
Object.entries(doneFlags).forEach(([flag, cardId]) => {
  if (localStorage.getItem(flag) === '1') {
    localStorage.removeItem(flag);
    completeCard(cardId);
  }
});
</script>
</body>
</html>
