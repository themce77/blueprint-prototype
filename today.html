<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Today</title>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px; position: relative; overflow: hidden;
  border-radius: 20px; transform-origin: center center;
  transform: scale(var(--s,1)); background: #1f1f25;
}

/* ─── Status bar ────────────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.9); pointer-events: none;
}

/* ─── Sidebar ───────────────────────────────────────────────── */
.today-sidebar {
  position: absolute;
  left: 24px; top: 50%; transform: translateY(-50%);
  width: 80px; height: 786px;
  background: #2b2b32; border-radius: 20px;
  padding: 24px 8px; box-sizing: border-box;
  display: flex; flex-direction: column;
  justify-content: space-between; align-items: center;
}

.sidebar-logo {
  font-family: var(--font-display);
  font-size: 16px; color: #8e8b85; text-transform: uppercase;
  text-align: center; letter-spacing: 0.5px;
  height: 52px; display: flex; align-items: center; justify-content: center;
  width: 100%;
}

.sidebar-nav { display: flex; flex-direction: column; gap: 12px; }

.nav-item {
  width: 64px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 8px 0; cursor: pointer;
  border-radius: 12px;
  transition: background 140ms;
}
.nav-item.active { background: #1f1f25; }
.nav-item:not(.active):hover { background: rgba(255,255,255,0.05); }

.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-icon img { width: 24px; height: 24px; display: block; }
.nav-item.active .nav-icon img { filter: brightness(0) invert(1); }

.spark-badge {
  position: relative; width: 24px; height: 24px; border-radius: 50%; overflow: hidden;
}
.spark-badge img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.spark-badge img:nth-child(1) { animation: spark-c1 6400ms linear 1600ms infinite; }
.spark-badge img:nth-child(2) { opacity: 0; animation: spark-c2 6400ms linear 1600ms infinite; }
.spark-badge img:nth-child(3) { opacity: 0; animation: spark-c3 6400ms linear 1600ms infinite; }
.spark-badge img:nth-child(4) { opacity: 0; animation: spark-c4 6400ms linear 1600ms infinite; }
@keyframes spark-c1 { 0%{opacity:1} 25%{opacity:0} 75%{opacity:0} 100%{opacity:1} }
@keyframes spark-c2 { 0%{opacity:0} 25%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
@keyframes spark-c3 { 0%{opacity:0} 50%{opacity:1} 75%{opacity:0} 100%{opacity:0} }
@keyframes spark-c4 { 0%{opacity:0} 75%{opacity:1} 100%{opacity:0} }

.nav-label {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #a4a59f; text-align: center; line-height: 16px;
  width: 64px;
}
.nav-item.active .nav-label { color: #f2f3e5; }

.sidebar-user {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.user-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: #b8c0ed; border: 2px solid #36363f;
  overflow: hidden; display: grid; place-items: center; font-size: 10px;
  box-sizing: border-box;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.user-name {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #a4a59f; text-align: center; width: 64px;
}

/* ─── Main content ──────────────────────────────────────────── */
.today-main {
  position: absolute;
  left: 149px; top: 50%;
  transform: translateY(-50%);
  width: 997px;
  display: flex; flex-direction: column; gap: 48px;
}

/* ─── Header row ────────────────────────────────────────────── */
.today-header {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.today-greeting h1 {
  font-family: var(--font-display); font-size: 64px; line-height: 1.06;
  letter-spacing: 1.5px; color: #f2f3e5; margin: 0 0 16px;
}
.today-greeting p {
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  letter-spacing: -0.1px; line-height: 20px;
  color: #f2f3e5; margin: 0;
}
.today-sparks-widget {
  width: 185px; background: #1f1f25;
  border: 1px solid #444450; border-radius: 20px;
  padding: 36px; box-sizing: border-box;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  flex-shrink: 0;
}
.sparks-label {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #f2f3e5; line-height: 16px;
}
.sparks-total {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 32px; line-height: 40px;
  letter-spacing: -0.8px; color: #f2f3e5;
}
.spark-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg,#f08b31,#ffbb25);
  display: grid; place-items: center; font-size: 14px; flex-shrink: 0;
}

/* ─── Cards row ─────────────────────────────────────────────── */
.today-cards { display: flex; gap: 16px; }

.t-card {
  width: 237px; height: 353px;
  position: relative; border-radius: 19px; overflow: hidden;
  flex-shrink: 0;
  transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1);
}
.card-img {
  width: 100%; height: 100%;
  display: block; object-fit: fill; border-radius: 19px;
}

/* Done layer — replaces overlay+checkmark */
.card-done-layer {
  position: absolute; inset: 0; border-radius: 19px; overflow: hidden;
  background: #36363f;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; z-index: 8;
  transition: opacity 400ms 150ms;
}
.t-card.done .card-done-layer { opacity: 1; }
.t-card.pre-done .card-done-layer { opacity: 1; }
.t-card.pre-done { pointer-events: none; }

.cdl-top {
  margin: 16px 16px 0 16px; flex: 1;
  background: #444450; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.cdl-monster { width: 180px; height: 180px; display: block; }
.cdl-footer {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; padding: 16px 0 20px;
}
.cdl-plus {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #f2f3e5; line-height: 16px;
}
.cdl-title {
  font-family: var(--font-display); font-size: 24px; line-height: 1.12;
  letter-spacing: -0.4px; color: #f2f3e5; text-align: center;
}


/* States */
.t-card.active { cursor: pointer; }
.t-card.active:hover { transform: scale(1.025); }
.t-card.queued { cursor: default; }
.t-card.done   { cursor: default; }

/* ─── Footer ────────────────────────────────────────────────── */
.today-footer { display: flex; justify-content: center; }
.btn-summary {
  height: 48px; padding: 0 24px; min-width: 200px;
  background: transparent; color: #f5f5f5;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.16);
  cursor: pointer; letter-spacing: -0.1px;
  box-shadow: 0 1px 1px rgba(20,21,26,0.03);
  transition: opacity 120ms;
}
.btn-summary:active { opacity: 0.7; }

</style>
</head>
<body>

<div class="bp-stage">
<div class="bp-device" id="device">

  <div class="sb"><span>9:41 Mon Jun 6</span><span>100% 🔋</span></div>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <nav class="today-sidebar">
    <div class="sidebar-logo">Sparkz</div>

    <div class="sidebar-nav">
      <div class="nav-item active">
        <div class="nav-icon"><img src="./components/icon-01.svg" alt="Today"></div>
        <span class="nav-label">Today</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><img src="./components/icon-02.svg" alt="Journal"></div>
        <span class="nav-label">Journal</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><img src="./components/icon-03.svg" alt="My toolkit"></div>
        <span class="nav-label">My toolkit</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><img src="./components/icon-04.svg" alt="Journey"></div>
        <span class="nav-label">Journey</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><img src="./components/icon-05.svg" alt="School"></div>
        <span class="nav-label">School</span>
      </div>
      <div class="nav-item">
        <div class="nav-icon">
          <div class="spark-badge">
            <img src="./components/Spark-4.svg" alt="">
            <img src="./components/Spark-01.svg" alt="">
            <img src="./components/Spark-02.svg" alt="">
            <img src="./components/Spark-03.svg" alt="">
          </div>
        </div>
        <span class="nav-label">Sparks</span>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">😊</div>
      <span class="user-name">Sophie</span>
    </div>
  </nav>

  <!-- ── Main content ─────────────────────────────────── -->
  <main class="today-main">

    <div class="today-header">
      <div class="today-greeting">
        <h1 id="greetTitle">Hi Sophie!</h1>
        <p id="greetSub">You've had 100% attendance this week.</p>
      </div>
      <div class="today-sparks-widget">
        <span class="sparks-label">Total</span>
        <div class="sparks-total">220<div class="spark-icon">⚡</div></div>
      </div>
    </div>

    <div class="today-cards" id="cardRow">

      <!-- Notice your wins — active (first task) -->
      <div class="t-card active" id="card-wins" onclick="openFlow('notice-wins.html')">
        <img class="card-img" src="./components/card-1.svg" alt="Notice your wins">
        <div class="card-done-layer">
          <div class="cdl-top"><img class="cdl-monster" src="./components/Property 1=M01, Type=Done.svg"></div>
          <div class="cdl-footer">
            <span class="cdl-plus">+1</span>
            <span class="cdl-title">Notice<br>your wins</span>
          </div>
        </div>
      </div>

      <!-- Write it out — queued -->
      <div class="t-card queued" id="card-write">
        <img class="card-img" src="./components/card-4.svg" alt="Write it out">
        <div class="card-done-layer">
          <div class="cdl-top"><img class="cdl-monster" src="./components/Property 1=M02, Type=Done.svg"></div>
          <div class="cdl-footer">
            <span class="cdl-plus">+1</span>
            <span class="cdl-title">Write<br>it out</span>
          </div>
        </div>
      </div>

      <!-- All about you — queued -->
      <div class="t-card queued" id="card-about">
        <img class="card-img" src="./components/card-6.svg" alt="All about you">
        <div class="card-done-layer">
          <div class="cdl-top"><img class="cdl-monster" src="./components/Property 1=M03, Type=Done.svg"></div>
          <div class="cdl-footer">
            <span class="cdl-plus">+1</span>
            <span class="cdl-title">All<br>about you</span>
          </div>
        </div>
      </div>

      <!-- Mood check-in — pre-done (completed in mood flow) -->
      <div class="t-card pre-done" id="card-mood">
        <div class="card-done-layer">
          <div class="cdl-top"><img class="cdl-monster" src="./components/Property 1=M04, Type=Done.svg"></div>
          <div class="cdl-footer">
            <span class="cdl-plus">+1</span>
            <span class="cdl-title">Mood<br>check-in</span>
          </div>
        </div>
      </div>

    </div>

    <div class="today-footer">
      <button class="btn-summary" onclick="window.location.href='summary.html'">View summary</button>
    </div>

  </main>

</div>
</div>

<script>
function scale() {
  const s = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  document.getElementById('device').style.setProperty('--s', s);
}
scale(); addEventListener('resize', scale);

// Load selected avatar from onboarding
(function() {
  const src = localStorage.getItem('bp_avatar');
  const bg  = localStorage.getItem('bp_avatar_bg');
  const el  = document.getElementById('userAvatar');
  if (src && el) {
    if (bg) el.style.background = bg;
    el.innerHTML = '<img src="' + src + '" alt="avatar">';
  }
})();

const FLOWS = {
  'card-wins':  'notice-wins.html',
  'card-write': null,
  'card-about': null,
};
const queue = ['card-wins', 'card-write', 'card-about'];

function openFlow(url) {
  if (url) window.location.href = url;
}

function completeCard(id) {
  const card = document.getElementById(id);
  if (!card || !card.classList.contains('active')) return;

  card.classList.remove('active');
  card.classList.add('done');

  // Track completed sections for summary.html
  const sectionMap = { 'card-wins': 'wins', 'card-write': 'write', 'card-about': 'about' };
  const sKey = sectionMap[id];
  if (sKey) {
    const done = JSON.parse(localStorage.getItem('bp_today_sections') || '["mood"]');
    if (!done.includes(sKey)) { done.push(sKey); localStorage.setItem('bp_today_sections', JSON.stringify(done)); }
  }

  const nextIdx = queue.indexOf(id) + 1;
  if (nextIdx < queue.length) {
    const nextId = queue[nextIdx];
    const next = document.getElementById(nextId);
    next.classList.remove('queued');
    next.classList.add('active');
    const nextFlow = FLOWS[nextId];
    next.setAttribute('onclick', nextFlow ? `openFlow('${nextFlow}')` : `completeCard('${nextId}')`);
  } else {
    checkAllDone();
  }
}

function checkAllDone() {
  const all = document.querySelectorAll('.t-card:not(.pre-done)');
  const allDone = [...all].every(c => c.classList.contains('done'));
  if (!allDone) return;

  all.forEach(c => c.classList.add('done-green'));
  document.getElementById('greetTitle').textContent = 'Mission completed!';
  document.getElementById('greetSub').textContent = 'Congratulations, Sophie!';
  document.getElementById('greetSub').style.color = '#4ecb9e';
}

// Handle returns from card flows
const doneFlags = {
  'bp_wins_done': 'card-wins',
};
Object.entries(doneFlags).forEach(([flag, cardId]) => {
  if (localStorage.getItem(flag) === '1') {
    localStorage.removeItem(flag);
    completeCard(cardId);
  }
});
</script>
</body>
</html>
