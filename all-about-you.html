<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — All about you</title>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px; position: relative; overflow: hidden;
  border-radius: 20px; transform-origin: center center;
  transform: scale(var(--s,1));
}

/* ─── Screen transitions ────────────────────────────────────── */
.screen {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 280ms cubic-bezier(0.4,0,0.2,1);
}
.screen.active { opacity: 1; pointer-events: all; }

/* ─── Status bar ────────────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: #fff; pointer-events: none;
}

/* ════════════════════════════════════════════════════════════
   SCREEN 1 — Survey
   ════════════════════════════════════════════════════════════ */
#s-survey { background: #58b880; }

/* Dark asterisk background shape */
.survey-bg-shape {
  position: absolute;
  width: 1189px; height: 1599px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(1.38);
  pointer-events: none; z-index: 0;
}

/* back button */
.btn-back {
  position: absolute; top: 36px; left: 24px; z-index: 10;
  width: 48px; height: 48px; border-radius: 8px;
  background: rgba(255,255,255,0.16);
  border: none; cursor: pointer; display: grid; place-items: center;
  transition: background 120ms;
}
.btn-back:hover { background: rgba(255,255,255,0.24); }
.btn-back svg { width: 20px; height: 20px; }

/* header + content flow */
.survey-body {
  position: absolute; top: 115px; left: 50%; transform: translateX(-50%); z-index: 5;
  width: 440px; display: flex; flex-direction: column; align-items: center;
}
.survey-header {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  margin-bottom: 48px; width: 100%;
}
.spark-pill {
  display: flex; align-items: center; gap: 8px;
  background: #2f2f37; border-radius: 99px;
  padding: 8px 12px;
  font-family: var(--font-display); font-size: 20px; color: #f2f3e5; line-height: 1.05;
}
.survey-title {
  font-family: var(--font-display); font-size: 32px; letter-spacing: -0.8px;
  color: #f2f3e5; margin: 0; line-height: 40px; text-align: center;
}

/* content area */
.survey-content {
  width: 100%; display: flex; flex-direction: column; gap: 24px;
}

/* message bubble */
.msg-bubble {
  background: #58b880; border-radius: 0;
  padding: 10px; display: flex; align-items: flex-start; gap: 12px;
}
.msg-avatar {
  width: 48px; height: 48px; background: #f2f3e5;
  flex-shrink: 0; display: grid; place-items: center;
}
.msg-monster { position: relative; width: 40px; height: 40px; }
.msg-butterfly { position: absolute; width: 36px; height: 36px; top: 2px; left: 2px; }
.msg-eyes {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 1px;
}
.msg-eye { width: 5.78px; height: 7.58px; display: block; }
.msg-text {
  font-family: var(--font-body); font-size: 20px; font-weight: 700;
  color: #2f2f37; line-height: 1.1; letter-spacing: -0.4px;
}

/* emoji grid */
.emoji-grid {
  display: flex; flex-direction: column; gap: 16px;
}
.emoji-row {
  display: flex; justify-content: space-between; align-items: center;
}
.emoji-btn {
  width: 78px; height: 78px; border-radius: 50%;
  background: #2f2f37; border: 8px solid #2f2f37;
  cursor: pointer; display: grid; place-items: center;
  font-size: 40px; line-height: 1;
  transition: border 120ms;
  box-sizing: border-box; flex-shrink: 0;
  padding: 0;
}
.emoji-btn.selected { border: 3px solid #f2f3e5; }
.emoji-btn:hover:not(.selected) { border-color: rgba(242,243,229,0.25); }

/* save button */
.btn-save-wrap {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 10;
}
.btn-save {
  width: 270px; height: 48px; border-radius: 8px;
  background: #f2f3e5; color: #1f1f25;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  border: none; cursor: pointer; transition: opacity 150ms, transform 120ms;
  display: flex; align-items: center; justify-content: center;
}
.btn-save:active { transform: scale(0.97); }
.btn-save:disabled { opacity: 0.4; cursor: default; }

/* ════════════════════════════════════════════════════════════
   SCREEN 2 — Completed
   ════════════════════════════════════════════════════════════ */
#s-done { background: #1f1f25; }

.done-center {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.done-reward-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 24px;
}
.done-reward-text {
  font-family: var(--font-display); font-size: 32px; color: #f2f3e5; line-height: 1;
}
.done-card-wrap {
  width: 237px; height: 353px; position: relative;
  animation: float 3s ease-in-out infinite;
  margin-bottom: 28px;
}
.done-card-img {
  width: 100%; height: 100%; border-radius: 19px; display: block;
}
.done-monster {
  position: absolute; top: 20px; left: 50%;
  transform: translateX(-50%);
  width: 180px; height: 180px;
  pointer-events: none;
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}
.done-title {
  font-family: var(--font-display); font-size: 80px; line-height: 1;
  color: #f2f3e5; letter-spacing: 1px;
  text-align: center; margin: 0;
}

</style>
</head>
<body>

<div class="bp-stage">
<div class="bp-device" id="device">

  <!-- SCREEN 1 — Survey -->
  <div class="screen active" id="s-survey">
    <img class="survey-bg-shape" src="./components/asterisk-3.svg" alt="">

    <div class="sb"><span>9:41 Mon Jun 6</span><span>100% 🔋</span></div>

    <button class="btn-back" onclick="history.back()">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M12 5L7 10L12 15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="survey-body">
      <div class="survey-header">
        <div class="spark-pill">
          1 <img src="./components/spark.svg" alt="spark" style="width:20px;height:20px;display:block;">
        </div>
        <h1 class="survey-title">All about you</h1>
      </div>

      <div class="survey-content">
        <div class="msg-bubble">
          <div class="msg-avatar">
            <div class="msg-monster">
              <img class="msg-butterfly" src="./components/monster-butterfly.svg" alt="">
              <div class="msg-eyes">
                <img class="msg-eye" src="./components/monster-eye.svg" alt="">
                <img class="msg-eye" src="./components/monster-eye.svg" alt="">
              </div>
            </div>
          </div>
          <p class="msg-text">Pick the emoji that best captures how you've felt for most of this week.</p>
        </div>

        <div class="emoji-grid">
          <div class="emoji-row">
            <button class="emoji-btn" onclick="selectEmoji(this)">😔</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">😟</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">😐</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">🙂</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">🤩</button>
          </div>
          <div class="emoji-row">
            <button class="emoji-btn" onclick="selectEmoji(this)">😄</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">😤</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">😰</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">😴</button>
            <button class="emoji-btn" onclick="selectEmoji(this)">🥳</button>
          </div>
        </div>
      </div>
    </div>

    <div class="btn-save-wrap">
      <button class="btn-save" id="btnSave" disabled onclick="saveSurvey()">
        Save
      </button>
    </div>
  </div>

  <!-- SCREEN 2 — Completed -->
  <div class="screen" id="s-done">
    <div class="sb"><span>9:41 Mon Jun 6</span><span>100% 🔋</span></div>

    <div class="done-center">
      <div class="done-reward-row">
        <span class="done-reward-text">+1</span>
        <img src="./components/spark.svg" alt="spark" style="width:28px;height:28px;display:block;">
      </div>

      <div class="done-card-wrap">
        <img class="done-card-img" src="./components/challenge-card-6.svg" alt="All about you">
      </div>

      <p class="done-title">Completed!</p>
    </div>
  </div>

</div>
</div>

<script>
function scale() {
  const s = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  document.getElementById('device').style.setProperty('--s', s);
}
scale(); addEventListener('resize', scale);

let cur = 's-survey';
function goTo(id) {
  document.getElementById(cur).classList.remove('active');
  document.getElementById(id).classList.add('active');
  cur = id;
}

let selectedBtn = null;
function selectEmoji(btn) {
  if (selectedBtn) selectedBtn.classList.remove('selected');
  btn.classList.add('selected');
  selectedBtn = btn;
  document.getElementById('btnSave').disabled = false;
}

function saveSurvey() {
  if (!selectedBtn) return;
  localStorage.setItem('bp_about_emoji', selectedBtn.textContent.trim());
  localStorage.setItem('bp_about_done', '1');
  setTimeout(() => { window.location.href = 'completed.html?card=about'; }, 400);
}

// Pre-fill if returning to edit
(function() {
  const saved = localStorage.getItem('bp_about_emoji');
  if (!saved) return;
  document.querySelectorAll('.emoji-btn').forEach(btn => {
    if (btn.textContent.trim() === saved) {
      btn.classList.add('selected');
      selectedBtn = btn;
      document.getElementById('btnSave').disabled = false;
    }
  });
})();
</script>
</body>
</html>
