<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Sparks</title>
<script>(function(){document.documentElement.style.setProperty('--s',Math.min(innerWidth/1194,innerHeight/834)*0.96);})()</script>
<link rel="stylesheet" href="./foundations/tokens.css">
<style>

body { background: #0a0a0f; overflow: hidden; margin: 0; }
.bp-stage { position: fixed; inset: 0; display: grid; place-items: center; }
.bp-device {
  width: 1194px; height: 834px; position: relative; overflow: hidden;
  border-radius: 20px; transform-origin: center center;
  transform: scale(var(--s,1)); background: #1f1f25;
}

/* ─── Status bar ────────────────────────────────────────────── */
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 24px; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.9); pointer-events: none;
}

/* ─── Sidebar ───────────────────────────────────────────────── */
.today-sidebar {
  position: absolute;
  left: 24px; top: 50%; transform: translateY(-50%);
  width: 80px; height: 786px;
  background: #2b2b32; border-radius: 20px;
  padding: 24px 8px; box-sizing: border-box;
  display: flex; flex-direction: column;
  justify-content: space-between; align-items: center;
  z-index: 10;
}
.sidebar-logo {
  font-family: var(--font-display); font-size: 16px; color: #8e8b85;
  text-transform: uppercase; text-align: center; letter-spacing: 0.5px;
  height: 52px; display: flex; align-items: center; justify-content: center; width: 100%;
}
.sidebar-nav { display: flex; flex-direction: column; gap: 12px; }
.nav-item {
  width: 64px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; padding: 8px 0; cursor: pointer;
  transition: background 140ms;
}
.nav-item.active { background: #1f1f25; }
.nav-item:not(.active):hover { background: rgba(255,255,255,0.05); }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-icon img { width: 24px; height: 24px; display: block; }
.nav-item.active .nav-icon img { filter: brightness(0) invert(1); }
.nav-label {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #a4a59f; text-align: center; width: 64px; line-height: 16px;
}
.nav-item.active .nav-label { color: #f2f3e5; }
.sidebar-user { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: #b8c0ed no-repeat center / cover;
  border: 2px solid #36363f;
  overflow: hidden; box-sizing: border-box;
}
.user-name {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #a4a59f; text-align: center; width: 64px;
}

/* ─── Lightning bg ──────────────────────────────────────────── */
.lightning-bg {
  position: absolute;
  left: -299px; top: -416px;
  width: 1865px; height: 1865px;
  pointer-events: none; z-index: 0; opacity: 1;
}

/* ─── Exit animations ────────────────────────────────────────── */
.today-sidebar.exit {
  transform: translateY(-50%) translateX(-120px);
  opacity: 0;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 1000ms cubic-bezier(0.73,-0.01,0.2,0.98);
}
.sparks-header-left.exit {
  transform: translateY(-160px);
  opacity: 0;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 1000ms cubic-bezier(0.73,-0.01,0.2,0.98);
}
.sparks-total-box.exit {
  transform: translateY(-160px);
  opacity: 0;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 1000ms cubic-bezier(0.73,-0.01,0.2,0.98);
}
.sparks-grid.exit {
  transform: translateY(300px);
  opacity: 0;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 1000ms cubic-bezier(0.73,-0.01,0.2,0.98);
}

/* ─── Main ──────────────────────────────────────────────────── */
.sparks-main {
  position: absolute;
  left: 152px; top: 56px;
  width: 998px;
  z-index: 1;
}

/* ─── Header ────────────────────────────────────────────────── */
.sparks-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 32px;
}
.sparks-header-left { width: 532px; display: flex; flex-direction: column; gap: 16px; }
.sparks-title {
  font-family: var(--font-display); font-size: 64px; line-height: 1.06;
  letter-spacing: 1.5px; color: #f2f3e5; margin: 0;
}
.sparks-subtitle {
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  color: #737472; letter-spacing: -0.1px; margin: 0;
}
.sparks-total-box {
  width: 185px;
  background: #1f1f25; border: 1px solid #444450; border-radius: 20px;
  padding: 36px; box-sizing: border-box;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.sparks-total-label {
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  color: #737472; letter-spacing: 0;
}
.sparks-total-num {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 32px; line-height: 40px;
  letter-spacing: -0.8px; color: #f2f3e5;
}
.sparks-total-num img { width: 32px; height: 32px; display: block; }

/* ─── Grid ──────────────────────────────────────────────────── */
.sparks-grid {
  display: flex; flex-direction: column; gap: 16px;
}
.sparks-row {
  display: flex; gap: 16px;
}

/* ─── Art card ──────────────────────────────────────────────── */
.art-card {
  flex: 1; height: 241px; border-radius: 16px;
  border: 1px solid #444450;
  position: relative; overflow: hidden;
  cursor: pointer;
}
.art-card-dark { background: #1f1f25; }
.art-card-blue { background: #3f50b8; border: none; }

/* lock icon */
.art-lock {
  position: absolute; top: 12px; right: 12px;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.art-lock img {
  width: 24px; height: 24px; display: block;
  filter: brightness(0) invert(1) brightness(0.267);
}

/* spark cost badge */
.art-badge {
  position: absolute; bottom: 19px; left: 19px;
  background: #2f2f37; border-radius: 99px;
  padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
}
.art-badge-num {
  font-family: var(--font-display); font-size: 20px; line-height: 1.05;
  color: #f2f3e5; text-transform: uppercase;
}
.art-badge img { width: 20px; height: 20px; display: block; }

/* artwork inside unlocked cards */
.art-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}

/* ─── Unlock overlay ────────────────────────────────────────── */
.unlock-overlay {
  position: absolute; inset: 0; z-index: 20;
  overflow: hidden; display: none;
  background: #3f50b8;
  transition: background-color 800ms cubic-bezier(0.73,-0.01,0.2,0.98);
}
.unlock-overlay.is-success { background: #4CAF82; }

.overlay-lightning {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%) rotate(0deg);
  width: 3730px; height: 6598px;
  pointer-events: none; z-index: 0;
  transition: transform 800ms cubic-bezier(0.73,-0.01,0.2,0.98);
}
.unlock-overlay.is-success .overlay-lightning {
  transform: translate(-50%,-50%) rotate(-30deg);
}

/* Confirm content panel */
.oc-confirm {
  position: absolute; inset: 0; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px;
  transition: transform 800ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 600ms ease;
}
.unlock-overlay.is-success .oc-confirm {
  transform: translateY(600px); opacity: 0;
}

/* Success content panel */
.oc-success {
  position: absolute; inset: 0; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px;
  transform: translateY(-600px); opacity: 0;
  transition: transform 800ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 600ms ease;
}
.unlock-overlay.is-success .oc-success {
  transform: translateY(0); opacity: 1;
}

/* confirm elements — enter from top/bottom on first reveal */
.confirm-badge {
  display: flex; align-items: center; gap: 8px;
  background: #2f2f37; border-radius: 99px; padding: 8px 16px;
  transform: translateY(-80px); opacity: 0;
}
.confirm-badge.in {
  transform: translateY(0); opacity: 1;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98),
              opacity 800ms ease;
}
.confirm-badge-num { font-family: var(--font-display); font-size: 20px; color: #f2f3e5; }
.confirm-badge img { width: 20px; height: 20px; display: block; }

.confirm-question {
  font-family: var(--font-display); font-size: 52px; line-height: 1.1;
  color: #f2f3e5; text-align: center; margin: 0;
  width: 685px; letter-spacing: 0.5px;
  transform: translateY(-80px); opacity: 0;
}
.confirm-question.in {
  transform: translateY(0); opacity: 1;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98) 60ms,
              opacity 800ms ease 60ms;
}

.confirm-btn {
  position: absolute; bottom: 45px; left: 50%;
  transform: translateX(-50%) translateY(80px); opacity: 0;
  width: 270px; height: 48px;
  background: #f2f3e5; border: none; border-radius: 8px;
  font-family: var(--font-body); font-size: 16px; font-weight: 700; color: #1f1f25;
  cursor: pointer;
}
.confirm-btn.in {
  transform: translateX(-50%) translateY(0); opacity: 1;
  transition: transform 1000ms cubic-bezier(0.73,-0.01,0.2,0.98) 120ms,
              opacity 800ms ease 120ms;
}

/* success elements */
.success-art {
  width: 237px; height: 241px; border-radius: 16px; display: block;
}
.success-label {
  font-family: var(--font-display); font-size: 72px; line-height: 1.1;
  color: #f2f3e5; margin: 0; letter-spacing: 1px;
}

</style>
</head>

<script>
function scale() {
  const s = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  document.getElementById('device').style.setProperty('--s', s);
}
scale(); addEventListener('resize', scale);

// Load avatar
(function(){
  var src = localStorage.getItem('bp_avatar') || './foundations/assets/avatars/avatar-3.svg';
  var bg  = localStorage.getItem('bp_avatar_bg') || '#b8c0ed';
  var el  = document.getElementById('userAvatar');
  if (el) el.style.background = bg + ' url("' + src + '") no-repeat center / cover';
})();

// Sync spark count from localStorage
(function() {
  const total = parseInt(localStorage.getItem('bp_sparks') || '0', 10);
  if (total > 0) document.getElementById('sparksCount').textContent = total;
})();

// ─── Unlock flow ───────────────────────────────────────────────
var _unlockCost = 0;
var _unlockCard = null;
var _cardRect   = null; // natural card position captured before exit

function tryUnlock(cost, card) {
  var sparks = parseInt(document.getElementById('sparksCount').textContent, 10);
  if (sparks < cost) return;
  _unlockCost = cost;
  _unlockCard = card;
  document.getElementById('confirm-cost').textContent = cost;
  document.getElementById('confirm-question').textContent =
    'Ready to unlock this collectible? It\'ll cost you ' + cost + ' Sparks.';

  // Capture natural card position before anything moves
  _cardRect = _unlockCard.getBoundingClientRect();

  // Exit main content immediately on click
  document.querySelector('.today-sidebar').classList.add('exit');
  document.querySelector('.sparks-header-left').classList.add('exit');
  document.querySelector('.sparks-total-box').classList.add('exit');
  document.querySelector('.sparks-grid').classList.add('exit');

  // Show overlay collapsed (clip-path 0%)
  var overlay = document.getElementById('unlock-overlay');
  overlay.style.display = 'block';
  overlay.style.clipPath = 'circle(0% at 50% 50%)';

  // Next frame: expand overlay
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      overlay.style.transition = 'clip-path 1000ms cubic-bezier(0.73,-0.01,0.2,0.98)';
      overlay.style.clipPath = 'circle(150% at 50% 50%)';

      // 200ms later: animate content in
      setTimeout(function() {
        document.querySelector('.confirm-badge').classList.add('in');
        document.querySelector('.confirm-question').classList.add('in');
        document.querySelector('.confirm-btn').classList.add('in');
      }, 200);
    });
  });
}

function doBuy() {
  var sparks = parseInt(document.getElementById('sparksCount').textContent, 10);
  var newTotal = Math.max(0, sparks - _unlockCost);
  document.getElementById('sparksCount').textContent = newTotal;
  localStorage.setItem('bp_sparks', newTotal);

  document.getElementById('unlock-overlay').classList.add('is-success');

  // After success content is visible, start exit sequence
  setTimeout(startSuccessExit, 1600);
  // Full cleanup after animations complete
  setTimeout(closeSuccess, 3200);
}

function startSuccessExit() {
  if (!_unlockCard || !_cardRect) return;
  var BEZ = 'cubic-bezier(0.73,-0.01,0.2,0.98)';
  var DUR = '1000ms';

  var overlay = document.getElementById('unlock-overlay');

  // Overlay background fades to transparent so main content shows through
  overlay.style.pointerEvents = 'none';
  overlay.style.transition    = 'background-color 700ms ease';
  overlay.style.backgroundColor = 'transparent';

  // 1. Lightning expands and fades — becomes the transition medium
  var lightning = document.querySelector('.overlay-lightning');
  lightning.style.transition = 'transform ' + DUR + ' ' + BEZ + ', opacity 600ms ease 300ms';
  lightning.style.transform  = 'translate(-50%,-50%) rotate(-30deg) scale(3)';
  lightning.style.opacity    = '0';

  // 2. "New collectible!" slides down
  var label = document.querySelector('.success-label');
  label.style.transition = 'transform ' + DUR + ' ' + BEZ + ', opacity 700ms ease';
  label.style.transform  = 'translateY(400px)';
  label.style.opacity    = '0';

  // 3. Art flies to card slot — measure actual positions, scale from center
  var s       = Math.min(innerWidth / 1194, innerHeight / 834) * 0.96;
  var devRect = document.getElementById('device').getBoundingClientRect();
  var art     = document.querySelector('.success-art');
  var artRect = art.getBoundingClientRect();

  // Centers in device-space coordinates
  var artCX  = (artRect.left + artRect.width  / 2 - devRect.left) / s;
  var artCY  = (artRect.top  + artRect.height / 2 - devRect.top)  / s;
  var cardCX = (_cardRect.left + _cardRect.width  / 2 - devRect.left) / s;
  var cardCY = (_cardRect.top  + _cardRect.height / 2 - devRect.top)  / s;
  var sc     = (_cardRect.width / s) / (artRect.width / s);

  art.style.transition      = 'transform ' + DUR + ' ' + BEZ;
  art.style.transformOrigin = 'center center';
  art.style.transform       = 'translate(' + (cardCX - artCX) + 'px,' + (cardCY - artCY) + 'px) scale(' + sc + ')';

  // 4. Main content re-enters — all at the same time, same duration
  var els = [
    document.querySelector('.today-sidebar'),
    document.querySelector('.sparks-header-left'),
    document.querySelector('.sparks-total-box'),
    document.querySelector('.sparks-grid'),
  ];
  els.forEach(function(el) {
    if (el) el.style.transition = 'transform ' + DUR + ' ' + BEZ + ', opacity ' + DUR + ' ease';
  });
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      els.forEach(function(el) { if (el) el.classList.remove('exit'); });
    });
  });

  // 5. Art lands → update card, fade art
  setTimeout(function() {
    if (_unlockCard) {
      _unlockCard.className = 'art-card art-card-blue';
      _unlockCard.removeAttribute('onclick');
      _unlockCard.style.cursor = 'default';
      _unlockCard.innerHTML    = '<img class="art-img" src="./components/Frame-1308.svg" alt="Artwork">';
    }
    art.style.transition = 'opacity 150ms ease';
    art.style.opacity    = '0';
  }, 950);
}

function closeSuccess() {
  // Hide overlay instantly
  var overlay = document.getElementById('unlock-overlay');
  overlay.style.transition = 'none';
  overlay.style.clipPath   = '';
  overlay.style.display    = 'none';
  overlay.classList.remove('is-success');

  // Reset confirm entry states
  document.querySelector('.confirm-badge').classList.remove('in');
  document.querySelector('.confirm-question').classList.remove('in');
  document.querySelector('.confirm-btn').classList.remove('in');

  // Reset art & label inline styles for next use
  var art   = document.querySelector('.success-art');
  var label = document.querySelector('.success-label');
  var light = document.querySelector('.overlay-lightning');
  [art, label, light].forEach(function(el) {
    el.style.transition = el.style.transform = el.style.opacity =
    el.style.transformOrigin = '';
  });

  // Restore overlay transition for next use
  setTimeout(function() { overlay.style.transition = ''; }, 50);

  // Ensure main content is fully reset (in case of fast re-click)
  var els = [
    document.querySelector('.today-sidebar'),
    document.querySelector('.sparks-header-left'),
    document.querySelector('.sparks-total-box'),
    document.querySelector('.sparks-grid'),
  ];
  els.forEach(function(el) {
    if (el) { el.classList.remove('exit'); el.style.transition = ''; }
  });

  _unlockCard = null;
  _cardRect   = null;
}
</script>
</body>
</html>
